<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة الرفع</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f2f2f2;
}

.box{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
}

.progress{
height:28px;
background:#ddd;
margin-top:10px;
display:none;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
color:white;
text-align:center;
}
</style>

</head>

<body>

<div class="box">

<h2>رفع APK</h2>

<input type="password"
id="token"
placeholder="GitHub Token">

<br><br>

<input
type="file"
id="apk"
accept=".apk">

<br><br>

<input
type="text"
id="name"
placeholder="اسم الملف.apk">

<button onclick="upload()">

رفع

</button>

<div
class="progress"
id="progress">

<div
class="bar"
id="bar">

0%

</div>

</div>

</div>

<script>

const REPO="01776787858de/apps";

async function upload(){

const token=
document
.getElementById("token")
.value;

const file=
document
.getElementById("apk")
.files[0];

const filename=
document
.getElementById("name")
.value;

if(!token||!file){

alert("أدخل الرمز واختر الملف");

return;

}

const progress=
document
.getElementById("progress");

const bar=
document
.getElementById("bar");

progress.style.display="block";

bar.style.width="10%";

const reader=
new FileReader();

reader.onload=
async e=>{

bar.style.width="50%";

const base64=
e.target
.result
.split(",")[1];

const res=
await fetch(

`https://api.github.com/repos/${REPO}/contents/${filename}`,

{

method:"PUT",

headers:{

Authorization:
`token ${token}`,

"Content-Type":
"application/json"

},

body:
JSON.stringify({

message:
"upload",

content:
base64

})

}

);

if(res.ok){

bar.style.width="100%";

bar.innerText="تم";

alert("نجح");

}else{

alert("فشل");

}

};

reader.readAsDataURL(file);

}

</script>

</body>

</html>
