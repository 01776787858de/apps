<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>لوحة رفع التطبيقات</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#0f172a;
color:white;
padding:20px;
}

.card{

max-width:700px;

margin:auto;

background:#1e293b;

padding:25px;

border-radius:20px;

box-shadow:0 0 30px rgba(0,0,0,.3);

}

h1{

text-align:center;

margin-bottom:25px;

}

input{

width:100%;

padding:14px;

margin-top:10px;

border:none;

border-radius:10px;

background:#334155;

color:white;

}

button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

opacity:.9;

}

.progress{

margin-top:15px;

height:30px;

background:#334155;

border-radius:10px;

overflow:hidden;

display:none;

}

.bar{

height:100%;

width:0;

background:#22c55e;

text-align:center;

line-height:30px;

}

.toast{

margin-top:15px;

padding:12px;

border-radius:10px;

display:none;

}

.success{

background:#15803d;

}

.error{

background:#b91c1c;

}

</style>

</head>

<body>

<div class="card">

<h1>📦 لوحة رفع APK</h1>

<input
type="password"
id="token"
placeholder="GitHub Token">

<input
type="file"
id="apk"
accept=".apk">

<input
type="text"
id="name"
placeholder="اسم الملف.apk">

<button onclick="upload()">

🚀 رفع التطبيق

</button>

<div
class="progress"
id="progress">

<div
class="bar"
id="bar">

0%

</div>

</div>

<div
class="toast"
id="toast">

</div>

</div>

<script>

const REPO="01776787858de/apps";

function toast(text,type){

const t=document.getElementById("toast");

t.className="toast "+type;

t.innerHTML=text;

t.style.display="block";

setTimeout(()=>{

t.style.display="none";

},4000);

}

document
.getElementById("apk")
.addEventListener("change",e=>{

if(e.target.files[0]){

document
.getElementById("name")
.value=

e.target.files[0].name;

}

});

async function upload(){

const token=
document
.getElementById("token")
.value
.trim();

const file=
document
.getElementById("apk")
.files[0];

const filename=
document
.getElementById("name")
.value
.trim();

if(!token){

toast(
"أدخل التوكن",
"error"
);

return;

}

if(!file){

toast(
"اختر APK",
"error"
);

return;

}

const progress=
document
.getElementById("progress");

const bar=
document
.getElementById("bar");

progress.style.display="block";

bar.style.width="20%";

bar.innerHTML="قراءة...";

const reader=
new FileReader();

reader.onload=
async e=>{

bar.style.width="50%";

bar.innerHTML="رفع...";

const base64=
e.target
.result
.split(",")[1];

try{

const res=
await fetch(

`https://api.github.com/repos/${REPO}/contents/${filename}`,

{

method:"PUT",

headers:{

Authorization:
`token ${token}`,

"Content-Type":
"application/json"

},

body:
JSON.stringify({

message:
`Upload ${filename}`,

content:
base64

})

}

);

if(res.ok){

bar.style.width="100%";

bar.innerHTML="تم";

toast(
"تم الرفع 🎉",
"success"
);

}else{

toast(
"فشل الرفع أو الملف كبير",
"error"
);

}

}

catch{

toast(
"خطأ اتصال",
"error"
);

}

};

reader.readAsDataURL(file);

}

</script>

</body>

</html>
